<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<h2>🎲 Create Table</h2>

Amount: <input id="amount"><br><br>
Type:
<select id="type">
<option>Full</option>
<option>Half</option>
</select><br><br>

Game+: <input id="game"><br><br>

<label><input type="checkbox" id="fresh"> Fresh Id</label><br>
<label><input type="checkbox" id="code"> Code Aap Doge</label><br>
<label><input type="checkbox" id="iphone"> No iPhone</label><br><br>

<button onclick="send()">Send Table</button>

<script>
function send(){
 const data = {
   amount: amount.value,
   type: type.value,
   game: game.value,
   fresh: fresh.checked,
   code: code.checked,
   iphone: iphone.checked
 };
 Telegram.WebApp.sendData(JSON.stringify(data));
}
</script>
</body>
</html>
